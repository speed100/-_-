<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الأصول والجرد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --gold: #d4af37; --gold2: #f0c040;
            --text: #e6edf3; --sub: #8b949e; --border: #30363d; --input: #21262d;
            --red: #da3633; --green: #2ea043; --shadow: rgba(0,0,0,0.5); --btn-text: #2b1a00;
        }
        .light-mode {
            --bg: #f0f2f5; --card: #ffffff; --gold: #b8860b; --gold2: #d4a017;
            --text: #1a1a1a; --sub: #555555; --border: #cccccc; --input: #ffffff;
            --shadow: rgba(0,0,0,0.1); --btn-text: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; padding: 20px; overflow-y: auto; transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 650px; margin: auto; }
        h1 { text-align: center; color: var(--gold); margin-bottom: 8px; font-size: 26px; }
        .sub { text-align: center; color: var(--sub); margin-bottom: 24px; font-size: 14px; }

        .card {
            background: var(--card); border: 1px solid var(--border); border-radius: 16px;
            padding: 22px 18px; margin-bottom: 18px; box-shadow: 0 2px 8px var(--shadow);
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
        }
        .card h3 { color: var(--gold2); margin-bottom: 16px; font-size: 18px; border-bottom: 2px solid var(--gold); padding-bottom: 8px; }

        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 13px; font-weight: 600; color: var(--sub); margin-bottom: 4px; }
        input, select, textarea {
            width: 100%; padding: 10px 14px; background: var(--input); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit; transition: 0.2s;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--gold); }

        .btn3d {
            position: relative; top: -4px; border: 0; transition: all 40ms linear;
            margin-top: 10px; margin-bottom: 10px; outline: none !important;
            -webkit-tap-highlight-color: transparent; width: 100%; padding: 14px;
            font-size: 16px; font-weight: 700; border-radius: 12px; cursor: pointer;
            font-family: inherit; letter-spacing: 1px; text-align: center;
            color: var(--btn-text);
            box-shadow: 0 0 0 1px #c9a020 inset, 0 0 0 2px rgba(255,255,255,0.15) inset, 0 8px 0 0 #6b4c0a, 0 8px 8px 1px rgba(0,0,0,0.5);
            background: linear-gradient(180deg, #fde482 0%, #e6b422 50%, #aa7c11 100%);
        }
        .btn3d:active { top: 2px; box-shadow: 0 0 0 1px #c9a020 inset, 0 0 0 2px rgba(255,255,255,0.15) inset, 0 0 0 0 #6b4c0a, 0 1px 3px 1px rgba(0,0,0,0.3); }
        .btn3d:disabled { opacity: 0.6; cursor: not-allowed; }

        .progress-container { display: none; margin: 12px 0; }
        .progress-bar { width: 100%; height: 10px; background: var(--input); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--gold); border-radius: 10px; transition: width 0.3s ease; }

        .image-upload { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; position: relative; }
        .image-preview {
            width: 60px; height: 60px; border-radius: 8px; border: 1px solid var(--border);
            object-fit: cover; display: none;
        }
        .btn-image {
            background: var(--input); color: var(--gold); padding: 10px 16px;
            border: 1px solid var(--gold); border-radius: 8px; font-size: 14px;
            cursor: pointer; font-family: inherit;
        }
        .image-menu {
            display: none; position: absolute; top: 100%; right: 0; background: var(--card);
            border: 1px solid var(--gold); border-radius: 8px; z-index: 10; min-width: 120px;
            box-shadow: 0 4px 12px var(--shadow);
        }
        .image-menu button {
            display: block; width: 100%; background: none; border: none;
            padding: 10px 14px; font-family: inherit; font-size: 14px; color: var(--text);
            text-align: right; cursor: pointer;
        }
        .image-menu button:hover { background: var(--input); }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center;
            z-index: 1000; visibility: hidden; opacity: 0; transition: 0.3s;
        }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-box {
            background: var(--card); border: 1px solid var(--gold); border-radius: 16px;
            padding: 24px; text-align: center; color: var(--text); max-width: 320px; width: 90%;
            box-shadow: 0 8px 24px var(--shadow);
        }
        .modal-box p { margin-bottom: 16px; font-size: 16px; }

        .footer { text-align: center; margin-top: 24px; color: var(--sub); font-size: 12px; }

        .theme-toggle {
            position: fixed; top: 15px; right: 15px; background: var(--card);
            border: 1px solid var(--gold); color: var(--gold); width: 40px; height: 40px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 20px; z-index: 500; box-shadow: 0 2px 8px var(--shadow); transition: 0.3s;
        }
        .theme-toggle:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</div>

    <div class="modal active" id="welcomeModal">
        <div class="modal-box">
            <h3>✨ مرحباً بك في سجل الأصول والجرد</h3>
            <p>القوة التنفيذية - القسم الجنوبي</p>
            <button class="btn3d" onclick="closeWelcome()">دخول</button>
        </div>
    </div>

    <div class="container">
        <h1>سجل الأصول والجرد</h1>
        <p class="sub">القوة التنفيذية - القسم الجنوبي</p>

        <div class="card">
            <h3>إضافة أصل جديد</h3>
            <div class="form-group"><label>اسم الأصل *</label><input type="text" id="assetName" placeholder="مثال: لابتوب، جرة غاز، بطانية..." list="assetNamesList" autocomplete="off" required><datalist id="assetNamesList"></datalist></div>
            <div class="form-group"><label>الفئة *</label><select id="category" required><option value="">اختر الفئة...</option><option value="إلكترونيات">إلكترونيات</option><option value="أثاث">أثاث</option><option value="مركبات">مركبات</option><option value="أسلحة">أسلحة</option><option value="ذخائر">ذخائر</option><option value="معدات ميدانية">معدات ميدانية</option><option value="قرطاسية">قرطاسية</option><option value="أخرى">أخرى</option></select></div>
            <div class="form-group"><label>حالة الأصل *</label><select id="condition" required><option value="">اختر الحالة...</option><option value="ممتاز">ممتاز</option><option value="جيد">جيد</option><option value="وسط">وسط</option><option value="سيء">سيء</option><option value="تالف">تالف</option></select></div>
            <div class="form-group"><label>العدد *</label><input type="number" id="quantity" placeholder="مثال: 5" min="1" value="1" required></div>
            <div class="form-group"><label>الشخص المستلم *</label><input type="text" id="recipient" placeholder="اسم الشخص الذي استلم الأصل" required></div>
            <div class="form-group"><label>الموقع *</label><select id="location" required><option value="">اختر الموقع...</option><option value="التنفيذية">التنفيذية</option><option value="السجن">السجن</option><option value="مكتب التحقيق">مكتب التحقيق</option><option value="الإدارة">الإدارة</option><option value="القاعدة">القاعدة</option><option value="المركزية">المركزية</option><option value="المستودع">المستودع</option><option value="المطبخ">المطبخ</option><option value="الملعب">الملعب</option><option value="البوابة">البوابة</option><option value="أخرى">أخرى</option></select></div>
            <div class="form-group"><label>ملاحظات</label><textarea id="notes" rows="2" placeholder="أي ملاحظات إضافية..."></textarea></div>
            <div class="form-group">
                <label>صورة الأصل</label>
                <div class="image-upload">
                    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;" onchange="handleImageSelect(event)">
                    <input type="file" id="galleryInput" accept="image/*" style="display:none;" onchange="handleImageSelect(event)">
                    <button type="button" class="btn-image" onclick="toggleImageMenu()">رفع صورة</button>
                    <div class="image-menu" id="imageMenu">
                        <button onclick="openCamera()">📷 كاميرا</button>
                        <button onclick="openGallery()">🖼️ معرض</button>
                    </div>
                    <img id="imagePreview" class="image-preview" src="" alt="معاينة">
                </div>
            </div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <p style="text-align:center; color:var(--sub); margin-top:4px;" id="progressText">جاري الإرسال...</p>
            </div>

            <button class="btn3d" id="addBtn" onclick="addAsset()">إضافة الأصل</button>
        </div>

        <div class="footer">Design by Abu Azzam 🍂</div>
    </div>

    <div class="modal" id="successModal">
        <div class="modal-box"><p>✅ تم رفع الأصل بنجاح</p><button class="btn3d" onclick="document.getElementById('successModal').classList.remove('active')">موافق</button></div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzxFll-TDP0m0BJbTu80hQMjOgEVjTtdoE5HawRmwMLtcyOKWTzCKye2OIPxDcIwv4FOQ/exec';
        let selectedImageBase64 = '';

        let audioCtx = null;
        function getAudioCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
        function playSound(freq, duration, vol) { try { const ctx = getAudioCtx(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.frequency.value = freq; gain.gain.setValueAtTime(vol, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration); osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration); } catch (e) {} }
        document.addEventListener('click', function(e) { if (e.target.closest('.btn3d')) playSound(800, 0.06, 0.3); else if (e.target.closest('.btn-image')) playSound(1200, 0.04, 0.2); else if (e.target.closest('.theme-toggle')) playSound(500, 0.08, 0.3); else if (e.target.closest('.image-menu button')) playSound(1000, 0.03, 0.2); });

        function toggleTheme() { document.body.classList.toggle('light-mode'); const isLight = document.body.classList.contains('light-mode'); document.getElementById('themeToggle').textContent = isLight ? '☀️' : '🌙'; localStorage.setItem('theme', isLight ? 'light' : 'dark'); }
        (function() { if (localStorage.getItem('theme') === 'light') { document.body.classList.add('light-mode'); document.getElementById('themeToggle').textContent = '☀️'; } })();

        function closeWelcome() { document.getElementById('welcomeModal').classList.remove('active'); }

        function toggleImageMenu() { const menu = document.getElementById('imageMenu'); menu.style.display = menu.style.display === 'block' ? 'none' : 'block'; }
        function openCamera() { document.getElementById('cameraInput').click(); document.getElementById('imageMenu').style.display = 'none'; }
        function openGallery() { document.getElementById('galleryInput').click(); document.getElementById('imageMenu').style.display = 'none'; }
        document.addEventListener('click', function(e) { if (!e.target.closest('.image-upload')) document.getElementById('imageMenu').style.display = 'none'; });

        function updateAssetNamesDatalist() { const stored = localStorage.getItem('assetNames'); const names = stored ? JSON.parse(stored) : []; const datalist = document.getElementById('assetNamesList'); datalist.innerHTML = ''; names.forEach(name => { const opt = document.createElement('option'); opt.value = name; datalist.appendChild(opt); }); }
        function addAssetNameToStorage(name) { const stored = localStorage.getItem('assetNames'); const names = stored ? JSON.parse(stored) : []; if (!names.includes(name)) { names.push(name); localStorage.setItem('assetNames', JSON.stringify(names)); updateAssetNamesDatalist(); } }
        updateAssetNamesDatalist();

        const lastLocation = localStorage.getItem('lastLocation');
        if (lastLocation) document.getElementById('location').value = lastLocation;

        function compressImage(base64, maxWidth, maxHeight, quality) { return new Promise((resolve, reject) => { const img = new Image(); img.onload = function() { let width = img.width; let height = img.height; if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; } if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; } const canvas = document.createElement('canvas'); canvas.width = width; canvas.height = height; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height); resolve(canvas.toDataURL('image/jpeg', quality)); }; img.onerror = reject; img.src = base64; }); }
        async function handleImageSelect(event) { const file = event.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = async function(e) { try { selectedImageBase64 = await compressImage(e.target.result, 800, 800, 0.7); } catch (err) { selectedImageBase64 = e.target.result; } document.getElementById('imagePreview').src = selectedImageBase64; document.getElementById('imagePreview').style.display = 'block'; }; reader.readAsDataURL(file); }

        async function addAsset() {
            const name = document.getElementById('assetName').value.trim(); const category = document.getElementById('category').value; const condition = document.getElementById('condition').value; const quantity = document.getElementById('quantity').value; const recipient = document.getElementById('recipient').value.trim(); const location = document.getElementById('location').value; const notes = document.getElementById('notes').value.trim();
            if (!name) return alert('الرجاء إدخال اسم الأصل');
            if (!category) return alert('الرجاء اختيار الفئة');
            if (!condition) return alert('الرجاء اختيار الحالة');
            if (!quantity || quantity < 1) return alert('الرجاء إدخال العدد');
            if (!recipient) return alert('الرجاء إدخال اسم المستلم');
            if (!location) return alert('الرجاء اختيار الموقع');

            const addBtn = document.getElementById('addBtn'); const progressContainer = document.getElementById('progressContainer'); const progressFill = document.getElementById('progressFill'); const progressText = document.getElementById('progressText');
            addBtn.disabled = true; progressContainer.style.display = 'block'; progressFill.style.width = '0%'; progressText.textContent = 'جاري الإرسال...';
            let width = 0; const interval = setInterval(() => { width += 10; if (width <= 90) progressFill.style.width = width + '%'; }, 150);

            const payload = { name, category, condition, quantity, recipient, location, notes, imageBase64: selectedImageBase64 };
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                clearInterval(interval);

                if (result.status === 'success') {
                    progressFill.style.width = '100%';
                    progressText.textContent = 'تمت الإضافة بنجاح ✅';
                    addAssetNameToStorage(name); localStorage.setItem('lastLocation', location);
                    setTimeout(() => {
                        document.getElementById('assetName').value = ''; document.getElementById('category').selectedIndex = 0; document.getElementById('condition').selectedIndex = 0; document.getElementById('quantity').value = '1'; document.getElementById('recipient').value = ''; document.getElementById('location').value = location; document.getElementById('notes').value = ''; document.getElementById('imagePreview').style.display = 'none'; selectedImageBase64 = ''; progressContainer.style.display = 'none'; addBtn.disabled = false;
                        document.getElementById('successModal').classList.add('active');
                    }, 1000);
                } else {
                    throw new Error(result.message || 'فشل الإضافة');
                }
            } catch (e) {
                clearInterval(interval);
                progressFill.style.width = '100%';
                progressFill.style.background = 'var(--red)';
                progressText.textContent = 'فشل الاتصال. تأكد من الإنترنت ❌';
                setTimeout(() => { progressContainer.style.display = 'none'; progressFill.style.background = 'var(--gold)'; addBtn.disabled = false; }, 2000);
            }
        }
    </script>
</body>
</html>
